{% extends 'website/base.html' %}
{% load static %}
{% block content %}

<!-- Breadcrumb -->
<div class="breadcumb-wrapper" data-bg-src="{% static 'assets/img/bg/breadcumb-bg.jpg' %}">
    <div class="container">
        <div class="breadcumb-content">
            <h1 class="breadcumb-title">Gallery</h1>
            <ul class="breadcumb-menu">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li>Gallery</li>
            </ul>
        </div>
    </div>
</div>

<!-- Gallery List -->
<section class="th-gallery-wrapper space-top space-extra-bottom">
    <div class="container">
        <div class="row">
            {% for item in galleries %}
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="gallery-card">
                    <a href="{% url 'gallery_details' item.slug %}">
                        {% if item.cover_image %}
                            <img src="{{ item.cover_image.url }}" alt="{{ item.name }}" class="img-fluid rounded shadow">
                        {% else %}
                            <img src="{% static 'assets/img/gallery/gallery-placeholder.jpg' %}" alt="{{ item.name }}" class="img-fluid rounded shadow">
                        {% endif %}
                    </a>
                    <h4 class="mt-3 text-center">
                        <a href="{% url 'gallery_details' item.slug %}">{{ item.name }}</a>
                    </h4>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <p class="text-center text-muted">No galleries available.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock content %}
